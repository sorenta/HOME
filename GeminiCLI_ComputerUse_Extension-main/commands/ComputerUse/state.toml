name = "/computeruse:state"
description = "Screenshot current page (capture_state) and optionally send to Gemini with a prompt."

prompt = '''
You have the tools: capture_state.

Args:
- action_name:str   (label for the screenshot filename)
- result_ok:bool    (default true)
- error_msg:str     (default "")
- prompt:str        (optional: if provided, call `gemini -p "@<file> <prompt>"`)

Steps:
1) capture_state(action_name={{action_name|"state"}}, result_ok={{result_ok|true}}, error_msg={{error_msg|""}})
2) If ok=false → print error and stop.
3) If {{prompt}} provided, run Gemini on the saved image using the host shell.

!{
  $ErrorActionPreference = "Stop"

  $PathValue = "{{path}}"
  $PromptText = "{{prompt}}"

  if ([string]::IsNullOrWhiteSpace($PathValue)) {
    Write-Output "No screenshot path returned."
    exit 0
  }

  if (-not [string]::IsNullOrWhiteSpace($PromptText) -and $PromptText -ne "None") {
    $GeminiBin = if ($env:GEMINI_BIN) { $env:GEMINI_BIN } else { "gemini" }
    & $GeminiBin -p "@$PathValue $PromptText"
  } else {
    Write-Output "Screenshot saved at: $PathValue"
    Write-Output "URL: {{url}}"
  }
}
'''
[defaults]
action_name = "state"
result_ok   = true
error_msg   = ""
prompt      = ""
