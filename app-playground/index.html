<!DOCTYPE html>
<html lang="lv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>H:O App Playground</title>
    <meta
      name="description"
      content="Statisks H:O aplikācijas playground, kas maksimāli tuvu atdarina esošo layout, tēmas un moduļu struktūru."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Fraunces:opsz,SOFT,WONK,wght@9..144,0..100,0..1,500;9..144,0..100,0..1,600;9..144,0..100,0..1,700&family=Inter:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700;800&family=Nunito:wght@400;500;600;700;800&family=Playfair+Display:wght@500;600;700&family=Rajdhani:wght@500;600;700&family=Space+Grotesk:wght@400;500;700&display=swap&subset=latin-ext"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-theme="lucent" data-view="dashboard">
    <div class="studio-shell">
      <section class="studio-toolbar" aria-label="Playground quick controls">
        <div class="studio-toolbar__copy">
          <p class="studio-kicker">H:O app playground</p>
          <h1>Esošā app statiskais spogulis</h1>
          <p class="studio-lede">
            Ātrie slēdži ir tikai playground vajadzībām. Pašā telefonā
            atveidots esošais karkass, navigācija, motīvi un moduļu sajūta.
          </p>
        </div>

        <div class="studio-toolbar__group">
          <span class="studio-label">Ātrais skats</span>
          <div class="studio-pills" id="quick-view-switcher">
            <button class="studio-pill is-active" type="button" data-view-jump="dashboard">Sākums</button>
            <button class="studio-pill" type="button" data-view-jump="events">Kalendārs</button>
            <button class="studio-pill" type="button" data-view-jump="kitchen">Virtuve</button>
            <button class="studio-pill" type="button" data-view-jump="finance">Finanses</button>
            <button class="studio-pill" type="button" data-view-jump="pharmacy">Aptieciņa</button>
            <button class="studio-pill" type="button" data-view-jump="reset">RESET</button>
            <button class="studio-pill" type="button" data-view-jump="settings">Iestatījumi</button>
          </div>
        </div>

        <div class="studio-toolbar__group">
          <span class="studio-label">Ātrais motīvs</span>
          <div class="studio-themes" id="quick-theme-switcher">
            <button class="theme-dot is-active" type="button" data-theme-jump="lucent" aria-label="Lucent">
              <span>✦</span>
            </button>
            <button class="theme-dot" type="button" data-theme-jump="hive" aria-label="Hive">
              <span>⬢</span>
            </button>
            <button class="theme-dot" type="button" data-theme-jump="pulse" aria-label="Pulse">
              <span>⚡</span>
            </button>
            <button class="theme-dot" type="button" data-theme-jump="forge" aria-label="Forge">
              <span>⛭</span>
            </button>
            <button class="theme-dot" type="button" data-theme-jump="botanical" aria-label="Botanical">
              <span>❋</span>
            </button>
          </div>
        </div>
      </section>

      <main class="device-stage">
        <section class="device">
          <div class="device__halo" aria-hidden="true"></div>
          <div class="device__frame">
            <div class="statusbar" aria-hidden="true">
              <span>9:41</span>
              <div class="statusbar__icons">
                <span></span>
                <span></span>
                <span></span>
              </div>
            </div>

            <div class="device__viewport">
              <div class="device__ambient" aria-hidden="true"></div>

              <div class="corner-actions">
                <button
                  class="corner-action"
                  type="button"
                  data-view-jump="settings"
                  aria-label="Atvērt iestatījumus"
                >
                  ⚙
                </button>
              </div>

              <div class="screen" id="screen-content"></div>
              <div id="settings-theme-switcher"></div>
            </div>

            <nav class="bottom-nav" aria-label="Primary navigation">
              <button class="nav-item is-active" type="button" data-view-jump="dashboard">
                <span class="nav-item__icon" data-icon="home"></span>
                <span class="nav-item__label">Sākums</span>
              </button>
              <button class="nav-item" type="button" data-view-jump="events">
                <span class="nav-item__icon" data-icon="calendar"></span>
                <span class="nav-item__label">Kalendārs</span>
              </button>
              <button class="nav-item" type="button" data-view-jump="kitchen">
                <span class="nav-item__icon" data-icon="kitchen"></span>
                <span class="nav-item__label">Virtuve</span>
              </button>
              <button class="nav-item" type="button" data-view-jump="finance">
                <span class="nav-item__icon" data-icon="finance"></span>
                <span class="nav-item__label">Finanses</span>
              </button>
              <button class="nav-item" type="button" data-view-jump="pharmacy">
                <span class="nav-item__icon" data-icon="pharmacy"></span>
                <span class="nav-item__label">Aptieciņa</span>
              </button>
              <button class="nav-item" type="button" data-view-jump="reset">
                <span class="nav-item__icon" data-icon="reset"></span>
                <span class="nav-item__label">RESET</span>
              </button>
            </nav>
          </div>
        </section>
      </main>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
