name: Claude Plugin

on:
  push:
    branches: [ main, next ]
    paths:
      - '.claude-plugin/**'
      - 'plugins/claude/**'
      - 'packages/skills/scripts/build-skill-adapters.js'
      - 'packages/skills/src/services/ai-context-generator.ts'
      - 'packages/skills/tests/ai-context-generator.test.ts'
      - 'README.md'
      - 'package.json'
      - '.github/workflows/claude-plugin.yml'
  pull_request:
    branches: [ main, next ]
    paths:
      - '.claude-plugin/**'
      - 'plugins/claude/**'
      - 'packages/skills/scripts/build-skill-adapters.js'
      - 'packages/skills/src/services/ai-context-generator.ts'
      - 'packages/skills/tests/ai-context-generator.test.ts'
      - 'README.md'
      - 'package.json'
      - '.github/workflows/claude-plugin.yml'
  workflow_dispatch:
    inputs:
      publish_release_asset:
        description: 'Create or update a GitHub release and attach the plugin zip'
        required: false
        default: false
        type: boolean
      release_tag:
        description: 'Tag name to publish the plugin bundle under, for example claude-plugin-v0.2.0'
        required: false
        type: string
      prerelease:
        description: 'Mark the GitHub release as a pre-release'
        required: false
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  validate-and-bundle:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ github.token }}

    outputs:
      artifact_name: ${{ steps.bundle.outputs.artifact_name }}
      zip_path: ${{ steps.bundle.outputs.zip_path }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Install dependencies
        run: npm install

      - name: Resolve n8n stable tag
        id: n8n-tag
        run: echo "tag=$(node scripts/ensure-n8n-cache.cjs --print-tag)" >> "$GITHUB_OUTPUT"

      - name: Cache n8n repository
        uses: actions/cache@v4
        with:
          path: .n8n-cache
          key: ${{ runner.os }}-n8n-cache-${{ steps.n8n-tag.outputs.tag }}-${{ hashFiles('scripts/ensure-n8n-cache.cjs') }}
          restore-keys: |
            ${{ runner.os }}-n8n-cache-

      - name: Validate Claude plugin manifests
        run: |
          node - <<'NODE'
          const fs = require('fs');

          const slimPlugin = JSON.parse(fs.readFileSync('plugins/claude/n8n-as-code/.claude-plugin/plugin.json', 'utf8'));
          const marketplace = JSON.parse(fs.readFileSync('.claude-plugin/marketplace.json', 'utf8'));

          if (fs.existsSync('.claude-plugin/plugin.json')) {
            throw new Error('Root .claude-plugin/plugin.json must not exist. Keep only marketplace.json at repo root to avoid plugin/workspace collisions.');
          }

          if (slimPlugin.name !== 'n8n-as-code') {
            throw new Error(`Unexpected slim plugin name: ${slimPlugin.name}`);
          }

          if (slimPlugin.skills !== './skills/') {
            throw new Error(`Expected slim plugin.skills to be ./skills/, got ${slimPlugin.skills}`);
          }

          if (!Array.isArray(marketplace.plugins) || marketplace.plugins.length === 0) {
            throw new Error('Marketplace must contain at least one plugin entry.');
          }

          const pluginEntry = marketplace.plugins.find((entry) => entry.name === slimPlugin.name);
          if (!pluginEntry) {
            throw new Error(`Marketplace does not include plugin entry for ${slimPlugin.name}.`);
          }

          if (pluginEntry.source !== './plugins/claude/n8n-as-code') {
            throw new Error(`Expected marketplace plugin source to be ./plugins/claude/n8n-as-code, got ${pluginEntry.source}`);
          }

          console.log('Claude plugin manifests validated successfully.');
          NODE

      - name: Build Claude plugin assets
        run: npm run build:claude-plugin

      - name: Verify committed skill not modified by build
        run: |
          for file in \
            plugins/claude/n8n-as-code/skills/n8n-architect/SKILL.md \
            plugins/openclaw/n8n-as-code/skills/n8n-architect/SKILL.md
          do
            if ! git diff --quiet --exit-code -- "$file"; then
              echo "Error: $file was modified by the plugin build."
              echo 'Please run "npm run build && npm run build:adapters --workspace=packages/skills" from the workspace root and commit the updated generated skill file.'
              exit 1
            fi
          done
          echo 'Committed generated skill files match the build output (no changes from build).'

      - name: Bundle Claude plugin
        id: bundle
        run: |
          ARTIFACT_NAME="n8n-as-code-claude-plugin"
          BUNDLE_DIR="$RUNNER_TEMP/$ARTIFACT_NAME"
          ZIP_PATH="$RUNNER_TEMP/${ARTIFACT_NAME}.zip"

          rm -rf "$BUNDLE_DIR" "$ZIP_PATH"
          cp -R plugins/claude/n8n-as-code "$BUNDLE_DIR"

          cd "$RUNNER_TEMP"
          zip -qr "$ZIP_PATH" "$ARTIFACT_NAME"

          echo "artifact_name=$ARTIFACT_NAME" >> "$GITHUB_OUTPUT"
          echo "zip_path=$ZIP_PATH" >> "$GITHUB_OUTPUT"

      - name: Upload plugin bundle directory
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.bundle.outputs.artifact_name }}
          path: ${{ runner.temp }}/${{ steps.bundle.outputs.artifact_name }}

      - name: Upload plugin zip
        uses: actions/upload-artifact@v4
        with:
          name: n8n-as-code-claude-plugin-zip
          path: ${{ steps.bundle.outputs.zip_path }}

  publish-release-asset:
    if: github.event_name == 'workflow_dispatch' && inputs.publish_release_asset && inputs.release_tag != ''
    needs: validate-and-bundle
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download plugin zip artifact
        uses: actions/download-artifact@v4
        with:
          name: n8n-as-code-claude-plugin-zip
          path: ./release-assets

      - name: Publish GitHub release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          prerelease: ${{ inputs.prerelease }}
          files: ./release-assets/*.zip
          generate_release_notes: true
