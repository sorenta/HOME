name: Nightly Cloud Regression

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  nightly-live-tests:
    runs-on: ubuntu-latest
    environment: next
    permissions:
      contents: write
    env:
      GITHUB_TOKEN: ${{ github.token }}
      N8N_HOST: ${{ vars.N8N_HOST }}
      N8N_API_KEY: ${{ secrets.N8N_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Install dependencies
        run: npm install

      - name: Resolve n8n stable tag
        id: n8n-tag
        run: echo "tag=$(node scripts/ensure-n8n-cache.cjs --print-tag)" >> "$GITHUB_OUTPUT"

      - name: Check if n8n version changed
        id: n8n-update-check
        run: |
          LATEST_TAG="${{ steps.n8n-tag.outputs.tag }}"
          SCHEMA_VERSION=$(node -e "try { const j=require('./packages/skills/src/assets/n8n-nodes-technical.json'); process.stdout.write(j.n8nVersion||''); } catch { process.stdout.write(''); }" 2>/dev/null)
          if [ "$SCHEMA_VERSION" = "$LATEST_TAG" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️  n8n version unchanged ($LATEST_TAG) — knowledge base rebuild not needed."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            N8N_SEMVER="${LATEST_TAG#n8n@}"
            echo "n8n_version=$N8N_SEMVER" >> "$GITHUB_OUTPUT"
            echo "🔄 n8n version changed: '$SCHEMA_VERSION' → '$LATEST_TAG'"
          fi

      - name: Cache n8n repository
        uses: actions/cache@v4
        with:
          path: .n8n-cache
          key: ${{ runner.os }}-n8n-cache-${{ steps.n8n-tag.outputs.tag }}-${{ hashFiles('scripts/ensure-n8n-cache.cjs') }}
          restore-keys: |
            ${{ runner.os }}-n8n-cache-

      - name: Build all packages
        run: npm run build

      - name: Run root test report
        if: env.N8N_HOST != '' && env.N8N_API_KEY != ''
        run: npm test

      - name: Commit and push knowledge base update
        if: steps.n8n-update-check.outputs.changed == 'true'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          if ls packages/skills/src/assets/*.json > /dev/null 2>&1; then
            git add -f packages/skills/src/assets/*.json
          fi
          if git diff --cached --quiet; then
            echo "ℹ️  No asset changes detected after rebuild, skipping commit."
          else
            git commit -m "fix(skills): rebuild knowledge base for n8n@${{ steps.n8n-update-check.outputs.n8n_version }}"
            git push
          fi
