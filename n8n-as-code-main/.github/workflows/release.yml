name: Release

on:
  push:
    branches: [main, next]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  publish-stable:
    name: Publish Stable
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: prod
    env:
      GITHUB_TOKEN: ${{ github.token }}
    outputs:
      pending: ${{ steps.pending.outputs.pending }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect pending stable publish
        id: pending
        run: |
          node scripts/release/workspace-release.mjs pending-stable > release-plan.json
          PENDING=$(node -e "const fs=require('fs'); process.stdout.write(JSON.parse(fs.readFileSync('release-plan.json','utf8')).changed ? 'true' : 'false');")
          echo "pending=$PENDING" >> "$GITHUB_OUTPUT"

      - name: Detect stable extension publish
        if: steps.pending.outputs.pending == 'true'
        id: stable-extension
        run: |
          CHANGED=$(node -e "const fs=require('fs'); const plan=JSON.parse(fs.readFileSync('release-plan.json','utf8')); const pkg=plan.packages.find(item => item.name === 'n8n-as-code'); process.stdout.write(pkg && pkg.changed ? 'true' : 'false');")
          echo "changed=$CHANGED" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        if: steps.pending.outputs.pending == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22.14'
          registry-url: 'https://registry.npmjs.org/'

      - name: Upgrade npm for trusted publishing
        if: steps.pending.outputs.pending == 'true'
        run: |
          npm install -g npm@^11.5.1
          npm --version

      - name: Install pnpm
        if: steps.pending.outputs.pending == 'true'
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Install dependencies
        if: steps.pending.outputs.pending == 'true'
        run: npm install

      - name: Resolve n8n stable tag
        if: steps.pending.outputs.pending == 'true'
        id: n8n-tag
        run: echo "tag=$(node scripts/ensure-n8n-cache.cjs --print-tag)" >> "$GITHUB_OUTPUT"

      - name: Cache n8n repository
        if: steps.pending.outputs.pending == 'true'
        uses: actions/cache@v4
        with:
          path: .n8n-cache
          key: ${{ runner.os }}-n8n-cache-${{ steps.n8n-tag.outputs.tag }}-${{ hashFiles('scripts/ensure-n8n-cache.cjs') }}
          restore-keys: |
            ${{ runner.os }}-n8n-cache-

      - name: Build all packages
        if: steps.pending.outputs.pending == 'true'
        run: npm run build

      - name: Publish npm packages
        if: steps.pending.outputs.pending == 'true'
        run: |
          should_publish() {
            node -e "const fs=require('fs'); const plan=JSON.parse(fs.readFileSync('release-plan.json','utf8')); const pkg=plan.packages.find(item => item.name === process.argv[1]); process.exit(pkg && pkg.changed ? 0 : 1);" "$1"
          }

          publish_npm() {
            local pkg_name="$1"
            local pkg_dir="$2"
            local version
            version=$(node -p "require('./${pkg_dir}/package.json').version")
            if npm view "${pkg_name}@${version}" version >/dev/null 2>&1; then
              echo "ℹ️ ${pkg_name}@${version} already exists on npm, skipping publish."
              return 0
            fi
            (cd "$pkg_dir" && npm publish --access public --tag latest)
          }

          if should_publish '@n8n-as-code/transformer'; then
            publish_npm '@n8n-as-code/transformer' 'packages/transformer'
          fi
          if should_publish '@n8n-as-code/skills'; then
            publish_npm '@n8n-as-code/skills' 'packages/skills'
          fi
          if should_publish 'n8nac'; then
            publish_npm 'n8nac' 'packages/cli'
          fi
          if should_publish '@n8n-as-code/mcp'; then
            publish_npm '@n8n-as-code/mcp' 'packages/mcp'
          fi
          if should_publish '@n8n-as-code/n8nac'; then
            publish_npm '@n8n-as-code/n8nac' 'plugins/openclaw/n8n-as-code'
          fi

      - name: Remove private flag for extension packaging
        if: steps.pending.outputs.pending == 'true' && steps.stable-extension.outputs.changed == 'true'
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('packages/vscode-extension/package.json', 'utf8'));
            delete pkg.private;
            fs.writeFileSync('packages/vscode-extension/package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Publish VS Code Marketplace stable release
        if: steps.pending.outputs.pending == 'true' && steps.stable-extension.outputs.changed == 'true'
        env:
          VSCE_TOKEN: ${{ secrets.VSCE_TOKEN }}
        run: |
          if [[ -z "$VSCE_TOKEN" ]]; then
            echo "❌ VSCE_TOKEN is missing in prod secrets."
            exit 1
          fi

          cd packages/vscode-extension
          VERSION=$(node -p "require('./package.json').version")
          EXISTING=$(curl -s -X POST "https://marketplace.visualstudio.com/_apis/public/gallery/extensionquery?api-version=7.2-preview.1" \
            -H "Content-Type: application/json" \
            -d '{"filters":[{"criteria":[{"filterType":7,"value":"etienne-lescot.n8n-as-code"}]}],"flags":529}' \
            | node -p "JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).results?.[0]?.extensions?.[0]?.versions?.map(v => v.version).join('\n') || ''")
          npx @vscode/vsce package --no-dependencies
          if echo "$EXISTING" | grep -qxF "$VERSION"; then
            echo "ℹ️ VS Code Marketplace already contains $VERSION, skipping publish."
          else
            npx @vscode/vsce publish --no-dependencies --pat "$VSCE_TOKEN"
          fi

      - name: Publish Open VSX stable release
        if: steps.pending.outputs.pending == 'true' && steps.stable-extension.outputs.changed == 'true'
        env:
          OVSX_TOKEN: ${{ secrets.OVSX_TOKEN }}
        run: |
          if [[ -z "$OVSX_TOKEN" ]]; then
            echo "⚠️ OVSX_TOKEN is missing, skipping Open VSX publish."
            exit 0
          fi
          cd packages/vscode-extension
          if compgen -G "*.vsix" > /dev/null; then
            npx ovsx publish *.vsix -p "$OVSX_TOKEN"
          else
            echo "⚠️ No VSIX artifact found, skipping Open VSX publish."
          fi

      - name: Push stable tags
        if: steps.pending.outputs.pending == 'true'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          node <<'NODE'
          const fs = require('fs');
          const { execFileSync } = require('child_process');
          const plan = JSON.parse(fs.readFileSync('release-plan.json', 'utf8'));
          const prefixByName = {
            '@n8n-as-code/transformer': '@n8n-as-code/transformer@v',
            '@n8n-as-code/skills': '@n8n-as-code/skills@v',
            '@n8n-as-code/mcp': '@n8n-as-code/mcp@v',
            '@n8n-as-code/n8nac': '@n8n-as-code/n8nac@v',
            'n8nac': 'n8nac@v',
            'n8n-as-code': 'n8n-as-code@v',
          };
          const changedPackages = plan.packages.filter(pkg => pkg.changed);
          for (const pkg of plan.packages) {
            if (!pkg.changed) continue;
            const tag = `${prefixByName[pkg.name]}${pkg.targetVersion}`;
            try {
              execFileSync('git', ['rev-parse', '-q', '--verify', `refs/tags/${tag}`], { stdio: 'ignore' });
            } catch {
              execFileSync('git', ['tag', tag], { stdio: 'inherit' });
            }
          }

          const releasePkg = plan.packages.find(pkg => pkg.name === 'n8nac' && pkg.changed);
          if (changedPackages.length > 0) {
            const shortSha = (process.env.GITHUB_SHA || execFileSync('git', ['rev-parse', '--short', 'HEAD'], { encoding: 'utf8' })).trim().slice(0, 7);
            const repoTag = releasePkg ? `v${releasePkg.targetVersion}` : `release-${shortSha}`;
            try {
              execFileSync('git', ['rev-parse', '-q', '--verify', `refs/tags/${repoTag}`], { stdio: 'ignore' });
            } catch {
              execFileSync('git', ['tag', repoTag], { stdio: 'inherit' });
            }
          }
          NODE
          git push origin --tags

      - name: Build GitHub release metadata
        if: steps.pending.outputs.pending == 'true'
        id: github-release
        run: |
          node <<'NODE'
          const fs = require('fs');
          const { execFileSync } = require('child_process');

          const plan = JSON.parse(fs.readFileSync('release-plan.json', 'utf8'));
          const pkg = plan.packages.find(item => item.name === 'n8nac');
          const changedPackages = plan.packages.filter(item => item.changed);

          if (changedPackages.length === 0) {
            fs.writeFileSync('github-release-meta.json', JSON.stringify({ publish: false }, null, 2));
            process.exit(0);
          }

          const packageMeta = new Map([
            ['n8n-as-code', {
              label: 'Editor Integrations',
              summary: 'Marketplace and Open VSX editor integration for browsing, searching, syncing, and validating n8n workflows.',
            }],
            ['n8nac', {
              label: 'CLI',
              summary: 'Shared command-line backbone for workspace bootstrap, GitOps sync, search, and automation.',
            }],
            ['@n8n-as-code/skills', {
              label: 'AI Skills and Claude Integration',
              summary: 'Embedded n8n ontology, AGENTS.md generation, and Claude-oriented workflow tooling.',
            }],
            ['@n8n-as-code/transformer', {
              label: 'TypeScript Transformer',
              summary: 'Decorator-based round-trip conversion between n8n JSON and TypeScript workflows.',
            }],
            ['@n8n-as-code/mcp', {
              label: 'MCP Server',
              summary: 'Dedicated Model Context Protocol server exposing n8n-as-code tools to MCP clients.',
            }],
            ['@n8n-as-code/n8nac', {
              label: 'OpenClaw Plugin',
              summary: 'Native OpenClaw setup and workflow operations powered by the same n8nac stack.',
            }],
          ]);

          function escapeRegExp(value) {
            return value.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
          }

          function extractChangelogSection(changelog, version) {
            const escapedVersion = escapeRegExp(version);
            return changelog.match(new RegExp(`## \\[${escapedVersion}\\][\\s\\S]*?(?=\\n## \\[|$)`))?.[0]?.trim() || '';
          }

          function stripSectionTitle(section) {
            const lines = section.split('\n');
            if (lines[0]?.startsWith('## [')) {
              lines.shift();
            }
            while (lines[0] === '') {
              lines.shift();
            }
            return lines.join('\n').trim();
          }

          const shortSha = (process.env.GITHUB_SHA || execFileSync('git', ['rev-parse', '--short', 'HEAD'], { encoding: 'utf8' })).trim().slice(0, 7);
          const version = pkg?.changed ? pkg.targetVersion : null;
          const tag = version ? `v${version}` : `release-${shortSha}`;
          const title = version
            ? (version === '1.0.0'
                ? "🚀 n8n-as-code v1.0.0 - The 'State of the Art' Release"
                : `n8n-as-code v${version}`)
            : 'n8n-as-code';

          const notesLines = [
            version ? `## n8n-as-code ${version}` : '## n8n-as-code',
            '',
            '### Product Surface',
            '',
            '- Editor integrations published via Microsoft Marketplace and Open VSX',
            '- Shared n8nac CLI for workspace bootstrap, sync, and automation',
            '- AI Skills and Claude-ready agent context generation',
            '- MCP server for Model Context Protocol clients',
            '- OpenClaw plugin support',
            '- TypeScript transformer for n8n workflow code',
            '',
            '### Included in this release',
            '',
            ...changedPackages.map(item => {
              const meta = packageMeta.get(item.name);
              return `- ${meta?.label || item.name}: ${item.currentVersion} -> ${item.targetVersion}`;
            }),
            '',
          ];

          for (const item of changedPackages) {
            const meta = packageMeta.get(item.name);
            const changelog = fs.readFileSync(item.changelogPath, 'utf8');
            const section = stripSectionTitle(extractChangelogSection(changelog, item.targetVersion));

            notesLines.push(`## ${meta?.label || item.name}`);
            notesLines.push('');
            notesLines.push(`Package: ${item.name}@${item.targetVersion}`);
            notesLines.push('');
            if (meta?.summary) {
              notesLines.push(meta.summary);
              notesLines.push('');
            }
            if (section) {
              notesLines.push(section);
              notesLines.push('');
            }
          }

          const notes = `${notesLines.join('\n').trim()}\n`;

          fs.writeFileSync('github-release-notes.md', `${notes}\n`);
          fs.writeFileSync('github-release-meta.json', JSON.stringify({
            publish: true,
            tag,
            title,
          }, null, 2));
          NODE

          PUBLISH=$(node -p "require('./github-release-meta.json').publish ? 'true' : 'false'")
          echo "publish=$PUBLISH" >> "$GITHUB_OUTPUT"
          if [[ "$PUBLISH" == 'true' ]]; then
            TAG=$(node -p "require('./github-release-meta.json').tag")
            TITLE=$(node -p "require('./github-release-meta.json').title")
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "title=$TITLE" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish GitHub release
        if: steps.pending.outputs.pending == 'true' && steps.github-release.outputs.publish == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.github-release.outputs.tag }}
          name: ${{ steps.github-release.outputs.title }}
          body_path: github-release-notes.md
          make_latest: true

      - name: Sync next to main
        if: steps.pending.outputs.pending == 'true'
        run: |
          git fetch origin main
          git push origin HEAD:refs/heads/next --force

  create-release-pr:
    name: Create Release PR
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: publish-stable
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.14'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Refresh tags after stable publish
        run: git fetch origin --tags --force

      - name: Prepare release plan
        id: release-plan
        run: |
          node scripts/release/workspace-release.mjs stable-pr --apply > release-plan.json
          CHANGED=$(node -e "const fs=require('fs'); process.stdout.write(JSON.parse(fs.readFileSync('release-plan.json','utf8')).changed ? 'true' : 'false');")
          echo "changed=$CHANGED" >> "$GITHUB_OUTPUT"

      - name: Refresh lockfile
        if: steps.release-plan.outputs.changed == 'true'
        run: npm install --package-lock-only

      - name: Build release PR body
        if: steps.release-plan.outputs.changed == 'true'
        run: |
          node <<'NODE'
          const fs = require('fs');
          const plan = JSON.parse(fs.readFileSync('release-plan.json', 'utf8'));
          const lines = [
            '## Release plan',
            '',
            'Commit-driven version bumps computed from the current main branch state.',
            '',
          ];
          for (const pkg of plan.packages.filter(item => item.changed)) {
            lines.push(`- ${pkg.name}: ${pkg.currentVersion} -> ${pkg.targetVersion} (${pkg.bump})`);
          }
          lines.push('', 'This PR was generated automatically after a push to main.');
          fs.writeFileSync('release-pr-body.md', `${lines.join('\n')}\n`);
          NODE

      - name: Create or update release PR
        if: steps.release-plan.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: release/main
          delete-branch: true
          commit-message: 'chore: release main'
          title: 'chore: release main'
          body-path: release-pr-body.md
          base: main
          add-paths: |
            package-lock.json
            packages/cli/CHANGELOG.md
            packages/cli/package.json
            packages/mcp/CHANGELOG.md
            packages/mcp/package.json
            packages/skills/CHANGELOG.md
            packages/skills/package.json
            packages/transformer/CHANGELOG.md
            packages/transformer/package.json
            packages/vscode-extension/CHANGELOG.md
            packages/vscode-extension/package.json
            plugins/openclaw/n8n-as-code/CHANGELOG.md
            plugins/openclaw/n8n-as-code/package.json

  publish-prerelease:
    name: Publish Prerelease
    if: github.ref == 'refs/heads/next' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    environment: next
    env:
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.14'
          registry-url: 'https://registry.npmjs.org/'

      - name: Upgrade npm for trusted publishing
        run: |
          npm install -g npm@^11.5.1
          npm --version

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Install dependencies
        run: npm install

      - name: Resolve n8n stable tag
        id: n8n-tag
        run: echo "tag=$(node scripts/ensure-n8n-cache.cjs --print-tag)" >> "$GITHUB_OUTPUT"

      - name: Cache n8n repository
        uses: actions/cache@v4
        with:
          path: .n8n-cache
          key: ${{ runner.os }}-n8n-cache-${{ steps.n8n-tag.outputs.tag }}-${{ hashFiles('scripts/ensure-n8n-cache.cjs') }}
          restore-keys: |
            ${{ runner.os }}-n8n-cache-

      - name: Prepare prerelease plan
        id: prerelease-plan
        run: |
          node scripts/release/workspace-release.mjs prerelease --apply > prerelease-plan.json
          CHANGED=$(node -e "const fs=require('fs'); process.stdout.write(JSON.parse(fs.readFileSync('prerelease-plan.json','utf8')).changed ? 'true' : 'false');")
          echo "changed=$CHANGED" >> "$GITHUB_OUTPUT"

      - name: Detect prerelease extension publish
        if: steps.prerelease-plan.outputs.changed == 'true'
        id: prerelease-extension
        run: |
          CHANGED=$(node -e "const fs=require('fs'); const plan=JSON.parse(fs.readFileSync('prerelease-plan.json','utf8')); const pkg=plan.packages.find(item => item.name === 'n8n-as-code'); process.stdout.write(pkg && pkg.changed ? 'true' : 'false');")
          echo "changed=$CHANGED" >> "$GITHUB_OUTPUT"

      - name: Refresh lockfile
        if: steps.prerelease-plan.outputs.changed == 'true'
        run: npm install --package-lock-only

      - name: Build all packages
        if: steps.prerelease-plan.outputs.changed == 'true'
        run: npm run build

      - name: Publish npm prereleases
        if: steps.prerelease-plan.outputs.changed == 'true'
        run: |
          should_publish() {
            node -e "const fs=require('fs'); const plan=JSON.parse(fs.readFileSync('prerelease-plan.json','utf8')); const pkg=plan.packages.find(item => item.name === process.argv[1]); process.exit(pkg && pkg.changed ? 0 : 1);" "$1"
          }

          publish_npm() {
            local pkg_name="$1"
            local pkg_dir="$2"
            local version
            version=$(node -p "require('./${pkg_dir}/package.json').version")
            if npm view "${pkg_name}@${version}" version >/dev/null 2>&1; then
              echo "ℹ️ ${pkg_name}@${version} already exists on npm, skipping publish."
              return 0
            fi
            (cd "$pkg_dir" && npm publish --access public --tag next)
          }

          if should_publish '@n8n-as-code/transformer'; then
            publish_npm '@n8n-as-code/transformer' 'packages/transformer'
          fi
          if should_publish '@n8n-as-code/skills'; then
            publish_npm '@n8n-as-code/skills' 'packages/skills'
          fi
          if should_publish 'n8nac'; then
            publish_npm 'n8nac' 'packages/cli'
          fi
          if should_publish '@n8n-as-code/mcp'; then
            publish_npm '@n8n-as-code/mcp' 'packages/mcp'
          fi
          if should_publish '@n8n-as-code/n8nac'; then
            publish_npm '@n8n-as-code/n8nac' 'plugins/openclaw/n8n-as-code'
          fi

      - name: Remove private flag for extension packaging
        if: steps.prerelease-plan.outputs.changed == 'true' && steps.prerelease-extension.outputs.changed == 'true'
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('packages/vscode-extension/package.json', 'utf8'));
            delete pkg.private;
            fs.writeFileSync('packages/vscode-extension/package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Publish VS Code Marketplace prerelease
        if: steps.prerelease-plan.outputs.changed == 'true' && steps.prerelease-extension.outputs.changed == 'true'
        env:
          VSCE_TOKEN: ${{ secrets.VSCE_TOKEN }}
        run: |
          if [[ -z "$VSCE_TOKEN" ]]; then
            echo "❌ VSCE_TOKEN is missing in next secrets."
            exit 1
          fi

          cd packages/vscode-extension
          VERSION=$(node -p "require('./package.json').version")
          EXISTING=$(curl -s -X POST "https://marketplace.visualstudio.com/_apis/public/gallery/extensionquery?api-version=7.2-preview.1" \
            -H "Content-Type: application/json" \
            -d '{"filters":[{"criteria":[{"filterType":7,"value":"etienne-lescot.n8n-as-code"}]}],"flags":529}' \
            | node -p "JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).results?.[0]?.extensions?.[0]?.versions?.map(v => v.version).join('\n') || ''")
          if echo "$EXISTING" | grep -qxF "$VERSION"; then
            echo "ℹ️ VS Code Marketplace already contains $VERSION, skipping publish."
          else
            npx @vscode/vsce package --no-dependencies
            npx @vscode/vsce publish --no-dependencies --pre-release --pat "$VSCE_TOKEN"
          fi

      - name: Skip Open VSX prereleases
        if: steps.prerelease-plan.outputs.changed == 'true' && steps.prerelease-extension.outputs.changed == 'true'
        run: |
          echo "ℹ️ Skipping Open VSX publish for next builds."
          echo "ℹ️ Open VSX exposes preview metadata, but downstream clients can still resolve the highest version by default."
          echo "ℹ️ Only stable releases from main are published to Open VSX."
